name: cookedbook

services:
  app:
    build: .
    container_name: cookedbook-app
    ports:
      - "8000:8000"
    volumes:
      # Mount specific directories for hot reload (excludes local database file)
      - ./templates:/app/templates
      - ./static:/app/static
      # Named volume for database persistence
      # This ensures your data survives container restarts and rebuilds
      - app_data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app_network:
    name: cookedbook_app_network

volumes:
  app_data:
    driver: local
