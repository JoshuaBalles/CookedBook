<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Recipe - CookedBook</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        (function() {
            const saved = localStorage.getItem('cookedbook-theme');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Create New Recipe</h1>
            <div class="header-right">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark and light mode">
                    <span class="icon-moon">🌙</span>
                    <span class="icon-sun">☀️</span>
                </button>
                <a href="/" class="btn btn-secondary">Back to Home</a>
            </div>
        </header>

        <form id="recipeForm">
            <div class="title-category-row">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required placeholder="e.g., Chocolate Chip Cookies">
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner" selected>Dinner</option>
                        <option value="Dessert">Dessert</option>
                        <option value="Snack">Snack</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Ingredients</label>
                <div id="ingredients-container">
                    <div class="ingredient-row">
                        <input type="number" name="ingredient_quantity" placeholder="Qty" step="0.25" min="0">
                        <input type="text" name="ingredient_unit" placeholder="Unit" list="unit-suggestions">
                        <input type="text" name="ingredient_name" placeholder="Ingredient name">
                        <input type="text" name="ingredient_notes" placeholder="Notes">
                        <button type="button" class="remove-btn" onclick="this.parentElement.remove()">×</button>
                    </div>
                </div>
                <datalist id="unit-suggestions">
                    <option value="cups">
                    <option value="cup">
                    <option value="tbsp">
                    <option value="tsp">
                    <option value="oz">
                    <option value="lb">
                    <option value="g">
                    <option value="kg">
                    <option value="ml">
                    <option value="L">
                    <option value="each">
                    <option value="pinch">
                    <option value="clove">
                </datalist>
                <button type="button" class="add-ingredient-btn" onclick="addIngredientRow()">+ Add Ingredient</button>
            </div>

            <div class="form-group">
                <label>Instructions</label>
                <div id="instructions-container">
                    <div class="instruction-row">
                        <button type="button" class="move-btn" onclick="moveInstruction(this, -1)" title="Move up">↑</button>
                        <textarea name="instruction_text" placeholder="Enter instruction step"></textarea>
                        <button type="button" class="move-btn" onclick="moveInstruction(this, 1)" title="Move down">↓</button>
                        <button type="button" class="remove-btn" onclick="this.parentElement.remove()">×</button>
                    </div>
                </div>
                <button type="button" class="add-instruction-btn" onclick="addInstructionRow()">+ Add Instruction</button>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cooking_time">Cooking Time <span class="hint">(minutes)</span></label>
                    <input type="number" id="cooking_time" name="cooking_time" value="0" min="0">
                </div>

                <div class="form-group">
                    <label for="servings">Servings</label>
                    <input type="number" id="servings" name="servings" value="1" min="1">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Recipe</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <p id="message"></p>
    </div>

    <script src="/static/theme.js"></script>
    <script>
        function addIngredientRow() {
            const container = document.getElementById('ingredients-container');
            const row = document.createElement('div');
            row.className = 'ingredient-row';
            row.innerHTML = `
                <input type="number" name="ingredient_quantity" placeholder="Qty" step="0.25" min="0">
                <input type="text" name="ingredient_unit" placeholder="Unit" list="unit-suggestions">
                <input type="text" name="ingredient_name" placeholder="Ingredient name">
                <input type="text" name="ingredient_notes" placeholder="Notes">
                <button type="button" class="remove-btn" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(row);
        }

        function addInstructionRow() {
            const container = document.getElementById('instructions-container');
            const row = document.createElement('div');
            row.className = 'instruction-row';
            row.innerHTML = `
                <button type="button" class="move-btn" onclick="moveInstruction(this, -1)" title="Move up">↑</button>
                <textarea name="instruction_text" placeholder="Enter instruction step"></textarea>
                <button type="button" class="move-btn" onclick="moveInstruction(this, 1)" title="Move down">↓</button>
                <button type="button" class="remove-btn" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(row);
        }

        function moveInstruction(button, direction) {
            const row = button.parentElement;
            const container = document.getElementById('instructions-container');
            const rows = Array.from(container.querySelectorAll('.instruction-row'));
            const index = rows.indexOf(row);
            
            if (direction === -1 && index > 0) {
                container.insertBefore(row, rows[index - 1]);
            } else if (direction === 1 && index < rows.length - 1) {
                container.insertBefore(rows[index + 1], row);
            }
        }

        document.getElementById('recipeForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const messageEl = document.getElementById('message');

            // Collect structured ingredients from rows
            const ingredientRows = document.querySelectorAll('.ingredient-row');
            const ingredients = [];
            ingredientRows.forEach(row => {
                const quantity = parseFloat(row.querySelector('[name="ingredient_quantity"]').value) || 0;
                const unit = row.querySelector('[name="ingredient_unit"]').value.trim();
                const name = row.querySelector('[name="ingredient_name"]').value.trim();
                const notes = row.querySelector('[name="ingredient_notes"]').value.trim();
                
                if (name) {
                    ingredients.push({
                        quantity: quantity,
                        unit: unit,
                        name: name,
                        notes: notes
                    });
                }
            });

            // Collect instructions from rows
            const instructionRows = document.querySelectorAll('.instruction-row');
            const instructions = [];
            instructionRows.forEach(row => {
                const text = row.querySelector('[name="instruction_text"]').value.trim();
                if (text) {
                    instructions.push(text);
                }
            });

            const data = {
                title: formData.get('title'),
                ingredients: ingredients,
                instructions: instructions,
                cooking_time: parseInt(formData.get('cooking_time')) || 0,
                servings: parseInt(formData.get('servings')) || 1,
                category: formData.get('category')
            };

            try {
                const response = await fetch('/api/recipes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    messageEl.textContent = 'Recipe created successfully!';
                    messageEl.className = 'success';
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    messageEl.textContent = 'Error creating recipe';
                    messageEl.className = 'error';
                }
            } catch (error) {
                messageEl.textContent = 'Error: ' + error.message;
                messageEl.className = 'error';
            }
        });
    </script>
</body>
</html>
